name: iosApp
options:
  bundleIdPrefix: com.alvaroquintana
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    "CODE_SIGN_IDENTITY[sdk=iphoneos*]": "Apple Development"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "YES"
    "CODE_SIGNING_REQUIRED[sdk=iphonesimulator*]": "NO"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": "x86_64"
    ONLY_ACTIVE_ARCH: "YES"
    # JetBrains' embedAndSignAppleFrameworkForXcode task copies the
    # framework + compose-resources into BUILT_PRODUCTS_DIR.
    FRAMEWORK_SEARCH_PATHS:
      - "$(inherited)"
      - "$(BUILT_PRODUCTS_DIR)"
    OTHER_LDFLAGS:
      - "$(inherited)"
      - "-framework"
      - "AdivinaRazaShared"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
        excludes:
          - "Info.plist"
    resources:
      - path: iosApp/Assets.xcassets
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: AdivinaRaza
        CFBundleShortVersionString: "3.0.2"
        CFBundleVersion: "34"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiredDeviceCapabilities:
          - arm64
        CADisableMinimumFrameDurationOnPhone: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserTrackingUsageDescription: >-
          We use this identifier to deliver personalized ads inside the
          AdivinaRaza game.
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alvaroquintana.adivinaperro
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_OBJC_BRIDGING_HEADER: ""
        # Granting keychain-access-groups so Firebase Auth can persist
        # the anonymous-sign-in user on iOS Simulator and avoid
        # SecItemCopyMatching (-34018) "A required entitlement isn't
        # present".
        CODE_SIGN_ENTITLEMENTS: iosApp/iosApp.entitlements
    preBuildScripts:
      - name: Build Kotlin Multiplatform Framework
        # Builds the AdivinaRazaShared.framework and copies it into
        # $BUILT_PRODUCTS_DIR for the linker.
        script: |
          cd "$SRCROOT/.."
          ./gradlew :app:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
    postCompileScripts:
      - name: Copy Compose Multiplatform Resources
        # The static AdivinaRazaShared framework does not bundle the
        # compose.resources artefacts. Copy them into the .app
        # bundle's compose-resources/ folder where the iOS resource
        # reader (DefaultIOsResourceReader) expects them.
        script: |
          set -e
          case "$SDK_NAME" in
            iphonesimulator*) KMP_TARGET="iosSimulatorArm64" ;;
            iphoneos*)        KMP_TARGET="iosArm64" ;;
            *) echo "Unknown SDK $SDK_NAME"; exit 1 ;;
          esac
          SRC="$SRCROOT/../app/build/kotlin-multiplatform-resources/aggregated-resources/${KMP_TARGET}/composeResources"
          DST="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/compose-resources/composeResources"
          if [ ! -d "$SRC" ]; then
            echo "warning: Compose resources not found at $SRC. Did the framework build succeed?"
            exit 0
          fi
          mkdir -p "$DST"
          rsync -a --delete "$SRC/" "$DST/"
        basedOnDependencyAnalysis: false
